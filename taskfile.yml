version: "3"

tasks:
  check:
    desc: Dezelfde checks als CI (pre-commit + pytest)
    cmds:
      - uv run pre-commit run --all-files
      - uv run pre-commit run --all-files --hook-stage pre-push
      - uv run python -m pytest

  genereer-vera-bvg-modellen:
    desc: Genereer VERA BVG modellen
    cmds:
      - uv run python scripts/genereer_vera_bvg_modellen.py
      - uv run python scripts/uitbreiden_vera_modellen.py
      - uv run pre-commit run --files woningwaardering/vera/bvg/generated.py --hook-stage commit || true
  genereer-vera-referentiedata:
    desc: Genereer VERA referentiedata
    cmds:
      - uv run python scripts/genereer_vera_referentiedata.py
      - uv run pre-commit run --files woningwaardering/vera/referentiedata/* --hook-stage commit || true
    ignore_errors: yes
  genereer-test-output:
    desc: Genereer alle expected test outputs (overschrijven)
    cmds:
      - uv run python scripts/genereer_test_output.py

  genereer-corop-data:
    desc: Genereer COROP data
    cmds:
      - uv run python scripts/genereer_corop_data.py
