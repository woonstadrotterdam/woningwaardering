version: "3"

tasks:
  genereer-vera-bvg-modellen:
    desc: Genereer VERA BVG modellen
    cmds:
      - python scripts/genereer_vera_bvg_modellen.py
      - python scripts/uitbreiden_vera_modellen.py
      - pre-commit run --files woningwaardering/vera/bvg/generated.py --hook-stage commit || true
  genereer-vera-referentiedata:
    desc: Genereer VERA referentiedata
    cmds:
      - python scripts/genereer_vera_referentiedata.py
      - pre-commit run --files woningwaardering/vera/referentiedata/* --hook-stage commit || true
    ignore_errors: yes
  genereer-opzet-woningwaarderinggroep:
    desc: Genereer de opzet voor de code van een woningwaarderinggroep
    cmds:
      - python scripts/genereer_opzet_woningwaarderinggroep.py
  genereer-test-output-ontbrekend:
    desc: Genereer alleen ontbrekende test outputs (overschrijft bestaande niet)
    cmds:
      - python scripts/genereer_test_output.py
  genereer-test-output-stelselgroepen:
    desc: Genereer expected stelselgroep-outputs (overschrijven)
    cmds:
      - python scripts/genereer_test_output.py --force --scope stelselgroepen
  genereer-test-output-units:
    desc: Genereer expected unit-outputs (overschrijven)
    cmds:
      - python scripts/genereer_test_output.py --force --scope units
  genereer-test-output-docs:
    desc: Genereer expected outputs voor docs-tests onder tests/docs/
    cmds:
      - python scripts/regen_docs_expected.py
  genereer-test-output:
    desc: Genereer alle expected test outputs (stelselgroepen, units, docs; overschrijven)
    cmds:
      - task: genereer-test-output-stelselgroepen
      - task: genereer-test-output-units
      - task: genereer-test-output-docs

  genereer-corop-data:
    desc: Genereer COROP data
    cmds:
      - python scripts/genereer_corop_data.py
